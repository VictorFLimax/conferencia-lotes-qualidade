name: CI

on: 
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs: 
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Chekout do código
        uses: actions/checkout@v4

      - name: Setup do Python
        uses: action/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

