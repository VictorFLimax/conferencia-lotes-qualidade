<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Lotes de Produção</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #18142a;
            --container-bg: rgba(25, 20, 43, 0.8);
            --neon-pink: #f72585;
            --neon-pink-glow: rgba(247, 37, 133, 0.5);
            --neon-cyan: #4cc9f0;
            --neon-cyan-glow: rgba(76, 201, 240, 0.5);
            --text-main: #ffffff;
            --text-muted: #a39fbd;
            --border-color: rgba(255, 255, 255, 0.2);
            --input-bg: rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #2a2045 0%, #18142a 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Principal */
        .window-container {
            width: 100%;
            max-width: 550px;
            background: var(--container-bg);
            border-radius: 12px;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink-glow), inset 0 0 10px var(--neon-pink-glow);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Barra Superior */
        .window-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .window-controls {
            display: flex;
            gap: 6px;
        }

        .control-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red { background-color: #ff5f56; }
        .dot-yellow { background-color: #ffbd2e; }
        .dot-green { background-color: #27c93f; }

        .url-bar {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text-muted);
            justify-content: space-between;
        }

        .url-bar .url-text {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Corpo do Formulário */
        .form-body {
            padding: 24px;
        }

        .form-title-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .icon-box {
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--neon-pink);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--neon-pink-glow);
        }

        .icon-box svg {
            fill: var(--neon-pink);
            width: 24px;
            height: 24px;
        }

        .form-titles h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .form-titles p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .divider {
            height: 1px;
            background: var(--border-color);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group label span {
            color: var(--neon-pink);
        }

        .form-control {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            appearance: none;
        }

        .form-control:focus {
            border-color: var(--neon-pink);
            box-shadow: 0 0 8px var(--neon-pink-glow);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: "▼";
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 12px 14px;
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .radio-option input[type="radio"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            outline: none;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .radio-option input[type="radio"]:checked {
            border-color: var(--neon-pink);
            box-shadow: 0 0 5px var(--neon-pink-glow);
        }

        .radio-option input[type="radio"]:checked::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: var(--neon-pink);
            border-radius: 50%;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(90deg, #ff0055, var(--neon-pink));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 15px var(--neon-pink-glow);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--neon-pink-glow);
        }

        .btn-submit svg {
            fill: white;
            width: 18px;
            height: 18px;
        }

        /* Box de Sucesso - Oculto por Padrão */
        .success-box {
            display: none; /* ← Alterado para none */
            align-items: center;
            gap: 16px;
            background: rgba(76, 201, 240, 0.1);
            border: 2px solid var(--neon-cyan);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 0 15px var(--neon-cyan-glow), inset 0 0 10px var(--neon-cyan-glow);
            animation: fadeIn 0.5s ease; /* Animação suave ao aparecer */
        }

        /* Classe que será adicionada via JavaScript */
        .success-box.show {
            display: flex; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-cyan-glow);
        }

        .success-icon svg {
            fill: var(--neon-cyan);
            width: 18px;
            height: 18px;
        }

        .success-text h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--neon-cyan);
            margin-bottom: 4px;
        }

        .success-text p {
            font-size: 13px;
            color: var(--text-main);
        }

        @media (max-width: 480px) {
            .radio-group {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="window-container">
        <div class="window-header">
            <div class="window-controls">
                <div class="control-dot dot-red"></div>
                <div class="control-dot dot-yellow"></div>
                <div class="control-dot dot-green"></div>
            </div>
            <div class="url-bar">
                <div class="url-text">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C9.243 2 7 4.243 7 7v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7c0-2.757-2.243-5-5-5zm-3 8V7c0-1.654 1.346-3 3-3s3 1.346 3 3v3H9z"></path></svg>
                    http://localhost:8080/lote-teste.html
                </div>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            </div>
        </div>

        <div class="form-body">
            <div class="form-title-section">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zm0 12.2l-10-5V17l10 5 10-5V9.2l-10 5z"></path></svg>
                </div>
                <div class="form-titles">
                    <h1>Cadastro de Lotes de Produção</h1>
                    <p>Sistema Corporativo – Ambiente de Teste</p>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Adicionado o ID formCadastro -->
            <form id="formCadastro" action="#" method="POST">
                
                <div class="form-group">
                    <label for="lote">Número do Lote <span>*</span></label>
                    <input type="text" id="lote" class="form-control" placeholder="Ex.: LOTE-2025-0001" required>
                </div>

                <div class="form-group">
                    <label for="produto">Produto <span>*</span></label>
                    <div class="select-wrapper">
                        <select id="produto" class="form-control" required>
                            <option value="" disabled selected>Selecione um produto</option>
                            <option value="1">Produto A</option>
                            <option value="2">Produto B</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Status <span>*</span></label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="status" value="pendente" checked> Pendente
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="status" value="processamento"> Em Processamento
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="status" value="concluido"> Concluído
                        </label>
                    </div>
                </div>

                <!-- Botão alterado para type="submit" -->
                <button type="submit" class="btn-submit">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    Processar Lote
                </button>

            </form>

            <!-- Box de Sucesso com ID adicionado -->
            <div id="mensagemSucesso" class="success-box">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"></path></svg>
                </div>
                <div class="success-text">
                    <h3>Sucesso!</h3>
                    <p>Lote processado com sucesso.</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Script para processar o formulário e exibir o sucesso -->
    <script>
        document.getElementById('formCadastro').addEventListener('submit', function(event) {
            // Previne o comportamento padrão de recarregar a página
            event.preventDefault();
            
            // Adiciona a classe 'show' que muda o display de 'none' para 'flex'
            document.getElementById('mensagemSucesso').classList.add('show');
            
            // Opcional: Você pode resetar o formulário aqui se quiser, usando:
            // this.reset();
        });
    </script>

</body>
</html>
